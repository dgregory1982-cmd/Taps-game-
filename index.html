<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cash Tap</title>
<style>
body{margin:0;background:#0a0a0a;color:#fff;font-family:Arial;text-align:center;overflow:hidden}
#score{font-size:40px;margin-top:40px}
#timer{font-size:25px;margin-top:10px;color:#0f0}
#btn{width:200px;height:200px;background:gold;border-radius:50%;margin:60px auto;border:none;font-size:30px;font-weight:bold;cursor:pointer}
#btn:active{transform:scale(0.9)}
</style>
</head>
<body>
<div id="score">Score: 0</div>
<div id="timer">10s</div>
<button id="btn">TAPE!</button>

<script>
let score=0,time=10;
const scoreEl=document.getElementById('score');
const timerEl=document.getElementById('timer');
const btn=document.getElementById('btn');

btn.onclick=()=>{if(time>0){score++;scoreEl.textContent='Score: '+score;}}

let t=setInterval(()=>{
time--;
timerEl.textContent=time+'s';
if(time<=0){
clearInterval(t);
btn.disabled=true;
btn.textContent='FINI! '+score;
alert('Ton score: '+score+'\nFais une capture et tag moi sur TikTok!');
}},1000);
</script>
</body>
</html>
